<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#2a78d6"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Podomètre"/>
<title>Podomètre</title>
<style>
:root{
  --blue:#2a78d6;
  --green:#1baf7a;
  --bg:#f5f5f3;
  --surface:#ffffff;
  --surface2:#f0efec;
  --border:rgba(0,0,0,0.10);
  --border-strong:rgba(0,0,0,0.18);
  --text:#0b0b0b;
  --text2:#52514e;
  --text3:#898781;
  --radius:8px;
  --accent-bg:#e6f1fb;
  --accent-text:#185fa5;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141413;
    --surface:#1f1f1e;
    --surface2:#2a2a28;
    --border:rgba(255,255,255,0.10);
    --border-strong:rgba(255,255,255,0.18);
    --text:#ffffff;
    --text2:#c3c2b7;
    --text3:#898781;
    --accent-bg:#0c447c;
    --accent-text:#85b7eb;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text)}
body{overflow-x:hidden}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}

/* Header */
.header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.header-row{display:flex;justify-content:space-between;align-items:center}
.app-title{font-size:18px;font-weight:500}
.date-lbl{font-size:12px;color:var(--text3);margin-top:2px}
.settings-ico{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;padding:4px;line-height:1}

/* Hero ring */
.hero{text-align:center;padding:20px 16px 10px}
.ring-wrap{position:relative;width:160px;height:160px;margin:0 auto 12px}
.ring-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-steps{font-size:28px;font-weight:500;display:block;line-height:1}
.ring-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

/* Goal bar */
.goal-bar-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin:0 16px 10px}
.goal-row{display:flex;justify-content:space-between;margin-bottom:6px}
.goal-row span{font-size:12px;color:var(--text2)}
.goal-pct{font-weight:500;color:var(--blue)}
.goal-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.goal-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s ease}

/* Stat cards */
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 16px 10px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px}
.card-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.card-val{font-size:21px;font-weight:500;line-height:1.1}
.card-unit{font-size:11px;color:var(--text2);margin-left:2px;font-weight:400}

/* Add steps */
.add-section{background:var(--surface);border-radius:12px;margin:0 16px 8px;padding:14px}
.add-title{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.add-row{display:flex;gap:8px;margin-bottom:8px}
.add-row input{flex:1;height:42px;border:0.5px solid var(--border-strong);border-radius:var(--radius);font-size:16px;padding:0 12px;background:var(--surface2);color:var(--text);outline:none}
.add-row input:focus{border-color:var(--blue)}
.add-btn{height:42px;padding:0 18px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;font-size:15px;font-weight:500;cursor:pointer;white-space:nowrap}
.add-btn:active{opacity:.85}
.dur-row{display:flex;align-items:center;gap:8px}
.dur-row label{font-size:13px;color:var(--text2)}
.dur-row input{width:70px;height:36px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:14px;padding:0 8px;background:var(--surface2);color:var(--text);outline:none}
.dur-row input:focus{border-color:var(--blue)}
.dur-row span{font-size:13px;color:var(--text3)}
.quick-btns{display:flex;gap:6px;margin-top:8px}
.q-btn{flex:1;height:34px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer}
.q-btn:active{background:var(--bg)}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);margin-top:8px}
.tab{flex:1;text-align:center;padding:12px 4px;font-size:13px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .2s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}

/* Tab content */
.tab-content{display:none;padding:14px 16px 0}
.tab-content.active{display:block}
.section-title{font-size:12px;color:var(--text2);margin-bottom:8px}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:96px;margin-bottom:2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar{width:100%;border-radius:3px 3px 0 0;background:var(--blue);min-height:2px;transition:height .3s}
.bar.today{background:var(--green)}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center}
.bar-val{font-size:8px;color:var(--text2)}

/* Summary grid */
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.sum-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.sum-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.sum-val{font-size:16px;font-weight:500;margin-top:2px}
.sum-sub{font-size:10px;color:var(--text2);margin-top:1px}

/* Settings panel */
.settings-panel{display:none;padding:14px 16px 0}
.settings-panel.active{display:block}
.setting-group{background:var(--surface);border-radius:12px;margin-bottom:10px;overflow:hidden}
.setting-row{display:flex;align-items:center;padding:12px 14px;border-bottom:0.5px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-lbl{flex:1;font-size:14px;color:var(--text)}
.setting-sub{font-size:11px;color:var(--text3);margin-top:1px}
.setting-ctrl{display:flex;align-items:center;gap:6px}
.setting-ctrl input{width:74px;height:34px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:14px;padding:0 8px;background:var(--surface2);color:var(--text);text-align:right;outline:none}
.setting-ctrl input:focus{border-color:var(--blue)}
.setting-unit{font-size:12px;color:var(--text3);min-width:28px}
.danger-btn{width:100%;padding:13px;background:none;border:0.5px solid #e24b4a;border-radius:var(--radius);color:#e24b4a;font-size:14px;cursor:pointer;border-radius:12px}
.danger-btn:active{opacity:.7}
.export-btn{width:100%;padding:13px;background:var(--blue);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:10px}
.export-btn:active{opacity:.85}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;transition:transform .3s ease;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-row">
      <div>
        <div class="app-title">&#128099; Podomètre</div>
        <div class="date-lbl" id="dateLabel"></div>
      </div>
      <button class="settings-ico" id="settingsToggle" aria-label="Paramètres">&#9881;</button>
    </div>
  </div>

  <div id="mainView">
    <div class="hero">
      <div class="ring-wrap">
        <svg viewBox="0 0 160 160" fill="none">
          <circle cx="80" cy="80" r="68" stroke-width="10" stroke="var(--border)"/>
          <circle cx="80" cy="80" r="68" stroke-width="10" stroke="var(--blue)"
            stroke-dasharray="427.3" id="ringArc" stroke-dashoffset="427.3"
            stroke-linecap="round" transform="rotate(-90 80 80)"
            style="transition:stroke-dashoffset .5s ease"/>
        </svg>
        <div class="ring-center">
          <span class="ring-steps" id="stepCount">0</span>
          <span class="ring-lbl">pas aujourd'hui</span>
        </div>
      </div>
    </div>

    <div class="goal-bar-wrap">
      <div class="goal-row">
        <span>Objectif : <span id="goalShow">10 000</span> pas</span>
        <span class="goal-pct" id="goalPct">0%</span>
      </div>
      <div class="goal-track"><div class="goal-fill" id="goalFill" style="width:0%"></div></div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-lbl">Distance</div>
        <div class="card-val" id="distVal">0<span class="card-unit">km</span></div>
      </div>
      <div class="card">
        <div class="card-lbl">Calories</div>
        <div class="card-val" id="calVal">0<span class="card-unit">kcal</span></div>
      </div>
      <div class="card">
        <div class="card-lbl">Vitesse moy.</div>
        <div class="card-val" id="speedVal">—<span class="card-unit">km/h</span></div>
      </div>
      <div class="card">
        <div class="card-lbl">Durée marche</div>
        <div class="card-val" id="durVal">—</div>
      </div>
    </div>

    <div class="add-section">
      <div class="add-title">Ajouter des pas</div>
      <div class="add-row">
        <input type="number" id="stepAdd" placeholder="Nombre de pas" min="1" inputmode="numeric"/>
        <button class="add-btn" id="addBtn">Ajouter</button>
      </div>
      <div class="quick-btns">
        <button class="q-btn" data-n="500">+500</button>
        <button class="q-btn" data-n="1000">+1 000</button>
        <button class="q-btn" data-n="2000">+2 000</button>
        <button class="q-btn" data-n="5000">+5 000</button>
      </div>
      <div class="dur-row" style="margin-top:10px">
        <label>Durée :</label>
        <input type="number" id="durInput" placeholder="0" min="0" max="1440" inputmode="numeric"/>
        <span>minutes</span>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="week">Semaine</div>
      <div class="tab" data-tab="month">Mois</div>
    </div>

    <div class="tab-content active" id="tab-week">
      <div class="section-title">7 derniers jours</div>
      <div class="bar-chart" id="weekChart"></div>
      <div class="sum-grid" id="weekSummary"></div>
    </div>
    <div class="tab-content" id="tab-month">
      <div class="section-title" id="monthTitle">Ce mois</div>
      <div class="bar-chart" id="monthChart"></div>
      <div class="sum-grid" id="monthSummary"></div>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="setting-group">
      <div class="setting-row">
        <div><div class="setting-lbl">Objectif journalier</div></div>
        <div class="setting-ctrl">
          <input type="number" id="sGoal" min="500" max="50000" step="500" inputmode="numeric"/>
          <span class="setting-unit">pas</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-lbl">Longueur de foulée</div><div class="setting-sub">Adapter à votre taille</div></div>
        <div class="setting-ctrl">
          <input type="number" id="sStride" min="40" max="120" step="1" inputmode="numeric"/>
          <span class="setting-unit">cm</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-lbl">Poids corporel</div><div class="setting-sub">Pour les calories</div></div>
        <div class="setting-ctrl">
          <input type="number" id="sWeight" min="30" max="200" step="1" inputmode="numeric"/>
          <span class="setting-unit">kg</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-lbl">Taille</div></div>
        <div class="setting-ctrl">
          <input type="number" id="sHeight" min="100" max="220" step="1" inputmode="numeric"/>
          <span class="setting-unit">cm</span>
        </div>
      </div>
    </div>

    <button class="export-btn" id="exportBtn">&#8681; Exporter les données (CSV)</button>
    <button class="danger-btn" id="resetDayBtn">Remettre à zéro aujourd'hui</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Service Worker inline (cache offline) ──────────────────────────────────
const SW_CODE = `
const CACHE = 'podometre-v1';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll([location.pathname || '/']))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
      if(res && res.status === 200 && res.type === 'basic'){
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return res;
    }).catch(() => cached))
  );
});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .catch(() => {
      // scope '/' peut échouer sur certains hébergements, on essaie sans scope
      navigator.serviceWorker.register(swUrl).catch(() => {});
    });
}
// ──────────────────────────────────────────────────────────────────────────

const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MONTHS_S=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function load(){try{return JSON.parse(localStorage.getItem('pod_v2')||'{}')}catch(e){return{}}}
function save(d){try{localStorage.setItem('pod_v2',JSON.stringify(d))}catch(e){}}
function loadCfg(){try{return JSON.parse(localStorage.getItem('pod_v2_cfg')||'{}')}catch(e){return{}}}
function saveCfg(c){try{localStorage.setItem('pod_v2_cfg',JSON.stringify(c))}catch(e){}}

function getCfg(){
  const c=loadCfg();
  return{goal:c.goal||10000,stride:c.stride||76,weight:c.weight||70,height:c.height||170};
}

function dayKey(dt){return`s_${dt.getFullYear()}_${dt.getMonth()}_${dt.getDate()}`}
function durKey(dt){return`d_${dt.getFullYear()}_${dt.getMonth()}_${dt.getDate()}`}
function todayKey(){return dayKey(new Date())}
function todayDurKey(){return durKey(new Date())}
function getV(key,data){return data[key]||0}
function calPerStep(w){return w*0.0005}
function fmtN(n){return n.toLocaleString('fr-FR')}
function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n)}
function fmtDur(min){if(!min)return'—';const h=Math.floor(min/60),m=min%60;return h>0?`${h}h${m.toString().padStart(2,'0')}`:`${m} min`}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function updateUI(){
  const data=load();
  const cfg=getCfg();
  const steps=getV(todayKey(),data);
  const dur=getV(todayDurKey(),data);
  const dist=steps*cfg.stride/100000;
  const cal=Math.round(steps*calPerStep(cfg.weight));
  const pct=Math.min(100,Math.round(steps/cfg.goal*100));
  const arc=427.3*(1-pct/100);
  const speed=dur>0?(dist/(dur/60)):null;

  document.getElementById('stepCount').textContent=fmtN(steps);
  document.getElementById('ringArc').setAttribute('stroke-dashoffset',arc.toFixed(1));
  document.getElementById('goalPct').textContent=pct+'%';
  document.getElementById('goalFill').style.width=pct+'%';
  document.getElementById('goalShow').textContent=fmtN(cfg.goal);
  document.getElementById('distVal').innerHTML=dist.toFixed(2)+'<span class="card-unit">km</span>';
  document.getElementById('calVal').innerHTML=cal+'<span class="card-unit">kcal</span>';
  document.getElementById('speedVal').innerHTML=(speed?speed.toFixed(1):'—')+'<span class="card-unit">km/h</span>';
  document.getElementById('durVal').textContent=fmtDur(dur);
  document.getElementById('durInput').value=dur||'';

  renderWeek(data,cfg);
  renderMonth(data,cfg);
}

function renderWeek(data,cfg){
  const today=new Date();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    days.push({label:DAYS[d.getDay()],steps:getV(dayKey(d),data),dur:getV(durKey(d),data),isToday:i===0});
  }
  const max=Math.max(...days.map(d=>d.steps),cfg.goal,1);
  document.getElementById('weekChart').innerHTML=days.map(d=>{
    const h=Math.max(Math.round(d.steps/max*88),d.steps>0?3:1);
    return`<div class="bar-col"><span class="bar-val">${d.steps>0?fmt(d.steps):''}</span><div class="bar${d.isToday?' today':''}" style="height:${h}px"></div><span class="bar-lbl">${d.label}</span></div>`;
  }).join('');

  const total=days.reduce((a,d)=>a+d.steps,0);
  const totalDur=days.reduce((a,d)=>a+d.dur,0);
  const avg=Math.round(total/7);
  const best=Math.max(...days.map(d=>d.steps));
  const daysActive=days.filter(d=>d.steps>0).length;
  const distTotal=total*cfg.stride/100000;
  const calTotal=Math.round(total*calPerStep(cfg.weight));
  const speedAvg=totalDur>0?(distTotal/(totalDur/60)).toFixed(1):'—';

  document.getElementById('weekSummary').innerHTML=`
    <div class="sum-card"><div class="sum-lbl">Total semaine</div><div class="sum-val">${fmtN(total)}</div><div class="sum-sub">${daysActive} jours actifs</div></div>
    <div class="sum-card"><div class="sum-lbl">Moyenne / jour</div><div class="sum-val">${fmtN(avg)}</div><div class="sum-sub">meilleur : ${fmtN(best)}</div></div>
    <div class="sum-card"><div class="sum-lbl">Distance totale</div><div class="sum-val">${distTotal.toFixed(1)} km</div><div class="sum-sub">${fmtN(calTotal)} kcal</div></div>
    <div class="sum-card"><div class="sum-lbl">Vitesse moy.</div><div class="sum-val">${speedAvg} km/h</div><div class="sum-sub">durée : ${fmtDur(totalDur)}</div></div>
  `;
}

function renderMonth(data,cfg){
  const today=new Date();
  const y=today.getFullYear(),m=today.getMonth();
  document.getElementById('monthTitle').textContent=`${MONTHS[m]} ${y}`;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const weeks=Math.ceil(daysInMonth/7);
  const wS=Array(weeks).fill(0),wD=Array(weeks).fill(0);
  let total=0,totalDur=0;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,m,d);
    const s=getV(dayKey(dt),data);const dur=getV(durKey(dt),data);
    const wi=Math.floor((d-1)/7);
    wS[wi]+=s;wD[wi]+=dur;total+=s;totalDur+=dur;
  }
  const max=Math.max(...wS,1);
  const curWeek=Math.floor((today.getDate()-1)/7);
  document.getElementById('monthChart').innerHTML=wS.map((s,i)=>{
    const h=Math.max(Math.round(s/max*88),s>0?3:1);
    return`<div class="bar-col"><span class="bar-val">${s>0?fmt(s):''}</span><div class="bar${i===curWeek?' today':''}" style="height:${h}px"></div><span class="bar-lbl">S${i+1}</span></div>`;
  }).join('');

  const distTotal=total*cfg.stride/100000;
  const calTotal=Math.round(total*calPerStep(cfg.weight));
  const speedAvg=totalDur>0?(distTotal/(totalDur/60)).toFixed(1):'—';
  const daysActive=Array.from({length:today.getDate()},(_,i)=>i+1).filter(d=>getV(dayKey(new Date(y,m,d)),data)>0).length;

  document.getElementById('monthSummary').innerHTML=`
    <div class="sum-card"><div class="sum-lbl">Total ${MONTHS_S[m]}</div><div class="sum-val">${fmtN(total)}</div><div class="sum-sub">${daysActive} jours actifs</div></div>
    <div class="sum-card"><div class="sum-lbl">Distance</div><div class="sum-val">${distTotal.toFixed(1)} km</div><div class="sum-sub">ce mois</div></div>
    <div class="sum-card"><div class="sum-lbl">Calories</div><div class="sum-val">${fmtN(calTotal)}</div><div class="sum-sub">kcal ce mois</div></div>
    <div class="sum-card"><div class="sum-lbl">Vitesse moy.</div><div class="sum-val">${speedAvg} km/h</div><div class="sum-sub">durée : ${fmtDur(totalDur)}</div></div>
  `;
}

function initSettings(){
  const cfg=getCfg();
  document.getElementById('sGoal').value=cfg.goal;
  document.getElementById('sStride').value=cfg.stride;
  document.getElementById('sWeight').value=cfg.weight;
  document.getElementById('sHeight').value=cfg.height;
}

['sGoal','sStride','sWeight','sHeight'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    const c=loadCfg();
    c.goal=parseInt(document.getElementById('sGoal').value)||10000;
    c.stride=parseInt(document.getElementById('sStride').value)||76;
    c.weight=parseInt(document.getElementById('sWeight').value)||70;
    c.height=parseInt(document.getElementById('sHeight').value)||170;
    saveCfg(c);
    updateUI();
    showToast('Paramètres enregistrés');
  });
});

document.getElementById('addBtn').addEventListener('click',()=>{
  const inp=document.getElementById('stepAdd');
  const n=parseInt(inp.value);
  if(!n||n<1){showToast('Entre un nombre de pas valide');return;}
  const data=load();
  const key=todayKey();
  data[key]=(data[key]||0)+n;
  save(data);
  inp.value='';
  updateUI();
  showToast(`+${fmtN(n)} pas ajoutés !`);
});

document.getElementById('stepAdd').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('addBtn').click();
});

document.querySelectorAll('.q-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const n=parseInt(btn.dataset.n);
    const data=load();
    const key=todayKey();
    data[key]=(data[key]||0)+n;
    save(data);
    updateUI();
    showToast(`+${fmtN(n)} pas ajoutés !`);
  });
});

document.getElementById('durInput').addEventListener('change',()=>{
  const v=parseInt(document.getElementById('durInput').value)||0;
  const data=load();
  data[todayDurKey()]=Math.max(0,v);
  save(data);
  updateUI();
});

document.getElementById('resetDayBtn').addEventListener('click',()=>{
  if(!confirm("Remettre les pas et la durée d'aujourd'hui à zéro ?"))return;
  const data=load();
  data[todayKey()]=0;
  data[todayDurKey()]=0;
  save(data);
  updateUI();
  showToast("Journée remise à zéro");
});

document.getElementById('settingsToggle').addEventListener('click',()=>{
  const panel=document.getElementById('settingsPanel');
  const main=document.getElementById('mainView');
  const isOpen=panel.classList.contains('active');
  if(isOpen){panel.classList.remove('active');main.style.display='block';document.getElementById('settingsToggle').textContent='⚙';}
  else{panel.classList.add('active');main.style.display='none';document.getElementById('settingsToggle').textContent='✕';}
});

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.add('active');
  });
});

document.getElementById('exportBtn').addEventListener('click',()=>{
  const data=load();const cfg=getCfg();
  const rows=['Date,Pas,Distance (km),Calories (kcal),Durée (min),Vitesse (km/h)'];
  const today=new Date();
  for(let i=89;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const steps=getV(dayKey(d),data);
    const dur=getV(durKey(d),data);
    const dist=(steps*cfg.stride/100000).toFixed(2);
    const cal=Math.round(steps*calPerStep(cfg.weight));
    const spd=dur>0?((steps*cfg.stride/100000)/(dur/60)).toFixed(1):'';
    const dd=`${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    rows.push(`${dd},${steps},${dist},${cal},${dur||''},${spd}`);
  }
  const csv='\uFEFF'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`podometre_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Export CSV téléchargé !');
});

const d=new Date();
document.getElementById('dateLabel').textContent=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
initSettings();
updateUI();
</script>
</body>
</html>
